name: Deploy Worker
on:
  push:
      branches: [main]
          paths: [worker.js]
            workflow_dispatch:

            jobs:
              deploy:
                  runs-on: ubuntu-latest
                      steps:
                            - uses: actions/checkout@v4
                                  - name: Deploy to Cloudflare Workers
                                          uses: cloudflare/wrangler-action@v3
                                                  with:
                                                            apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                                                                      accountId: 8c7306c35619ae9925ee1eefea2331c5
                                                                                command: deploy worker.js --name knot-exodia --compatibility-date 2024-01-01
