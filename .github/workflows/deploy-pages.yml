name: Deploy Pages
on:
  push:
      branches: [main]
          paths: [index.html]
            workflow_dispatch:

            jobs:
              deploy:
                  runs-on: ubuntu-latest
                      steps:
                            - uses: actions/checkout@v4
                                  - name: Deploy to Cloudflare Pages
                                          uses: cloudflare/wrangler-action@v3
                                                  with:
                                                            apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                                                                      accountId: 8c7306c35619ae9925ee1eefea2331c5
                                                                                command: pages deploy . --project-name=knot-ai --branch=main
